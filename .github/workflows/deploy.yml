name: Deploy to Server

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: 76.13.32.166
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: /opt/oni/scripts/deploy.sh
